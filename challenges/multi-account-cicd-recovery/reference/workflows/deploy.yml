name: protected-multi-account-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: payments-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: payments

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      registry: ${{ steps.ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::111122223333:role/payments-build
          aws-region: ${{ env.AWS_REGION }}
      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

  plan-production:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - run: terraform plan -input=false

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::444455556666:role/payments-staging-deploy
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          image="${{ needs.build.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ needs.build.outputs.digest }}"
          aws ecs describe-task-definition \
            --task-definition payments-staging \
            --query taskDefinition > current.json
          jq --arg image "$image" \
            '.containerDefinitions[0].image = $image |
             del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
            current.json > next.json
          task_definition="$(aws ecs register-task-definition \
            --cli-input-json file://next.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"
          aws ecs update-service \
            --cluster payments-staging \
            --service payments \
            --task-definition "$task_definition"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, plan-production, deploy-staging]
    environment: production
    outputs:
      previous_task_definition: ${{ steps.previous.outputs.task-definition }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::777788889999:role/payments-production-deploy
          aws-region: ${{ env.AWS_REGION }}
      - id: previous
        run: |
          previous_task_definition="$(aws ecs describe-services \
            --cluster payments-production \
            --services payments \
            --query 'services[0].taskDefinition' \
            --output text)"
          echo "task-definition=$previous_task_definition" >> "$GITHUB_OUTPUT"
      - run: |
          image="${{ needs.build.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ needs.build.outputs.digest }}"
          aws ecs describe-task-definition \
            --task-definition payments-production \
            --query taskDefinition > current.json
          jq --arg image "$image" \
            '.containerDefinitions[0].image = $image |
             del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
            current.json > next.json
          task_definition="$(aws ecs register-task-definition \
            --cli-input-json file://next.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"
          aws ecs update-service \
            --cluster payments-production \
            --service payments \
            --task-definition "$task_definition"

  verify-production:
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - run: curl --fail --retry 12 --retry-delay 10 https://payments.example.com/health

  rollback-production:
    runs-on: ubuntu-latest
    needs: [deploy-production, verify-production]
    if: ${{ failure() }}
    environment: production
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::777788889999:role/payments-production-deploy
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          aws ecs update-service \
            --cluster payments-production \
            --service payments \
            --task-definition "${{ needs.deploy-production.outputs.previous_task_definition }}"

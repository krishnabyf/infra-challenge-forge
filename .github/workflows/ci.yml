name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  evaluator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: pytest
      - name: Prove fail-closed behavior and reference score
        run: |
          set +e
          infra-forge evaluate challenges/eks-incident-response/challenge.yaml \
            --plan challenges/eks-incident-response/fixtures/insecure-plan.json \
            --manifests challenges/eks-incident-response/starter/kubernetes
          result=$?
          set -e
          test "$result" -eq 2
          infra-forge evaluate challenges/eks-incident-response/challenge.yaml \
            --plan challenges/eks-incident-response/fixtures/secure-plan.json \
            --manifests challenges/eks-incident-response/reference/kubernetes
          set +e
          infra-forge evaluate challenges/multi-account-cicd-recovery/challenge.yaml \
            --plan challenges/multi-account-cicd-recovery/fixtures/insecure-plan.json \
            --manifests challenges/multi-account-cicd-recovery/starter/workflows
          result=$?
          set -e
          test "$result" -eq 2
          infra-forge evaluate challenges/multi-account-cicd-recovery/challenge.yaml \
            --plan challenges/multi-account-cicd-recovery/fixtures/secure-plan.json \
            --manifests challenges/multi-account-cicd-recovery/reference/workflows

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: >-
            -color
            .github/workflows/ci.yml
            .github/workflows/publish-container.yml
            challenges/multi-account-cicd-recovery/starter/workflows/deploy.yml
            challenges/multi-account-cicd-recovery/reference/workflows/deploy.yml
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.6.6
      - name: Check Terraform formatting
        run: terraform fmt -check -recursive challenges
      - name: Validate multi-account starter Terraform
        working-directory: challenges/multi-account-cicd-recovery/starter/terraform
        run: |
          terraform init -backend=false -input=false
          terraform validate
      - name: Validate multi-account reference Terraform
        working-directory: challenges/multi-account-cicd-recovery/reference/terraform
        run: |
          terraform init -backend=false -input=false
          terraform validate
      - name: Validate Kubernetes schemas
        uses: docker://ghcr.io/yannh/kubeconform:v0.8.0
        with:
          entrypoint: /kubeconform
          args: >-
            -strict
            -summary
            challenges/eks-incident-response/reference/kubernetes/workload.yaml

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: infra-challenge-forge:ci

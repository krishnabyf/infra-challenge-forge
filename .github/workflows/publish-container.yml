name: publish-container

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic version tag to publish, for example v0.2.0
        required: true
        default: v0.2.0

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/infra-challenge-forge

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          tag="${RELEASE_TAG:-$DISPATCH_TAG}"
          if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Expected a tag such as v0.2.0, received: $tag" >&2
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "version=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            echo "minor=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Resolve release commit
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - uses: docker/setup-buildx-action@v4

      - name: Authenticate to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | docker login "$REGISTRY" --username "$GITHUB_ACTOR" --password-stdin

      - name: Build and publish signed release image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.minor }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=Infrastructure Challenge Forge
            org.opencontainers.image.description=Executable evaluator for realistic Terraform, AWS, and Kubernetes challenges
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Attest published image
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Publish summary
        run: |
          {
            echo "## Published container"
            echo
            echo "\`${REGISTRY}/${IMAGE_NAME}:${{ steps.version.outputs.version }}\`"
            echo
            echo "Digest: \`${{ steps.push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
